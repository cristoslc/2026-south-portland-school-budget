name: Evidence Pipeline

on:
  schedule:
    # 8 AM and 8 PM ET — both EDT (UTC-4) and EST (UTC-5) offsets
    - cron: '0 0,1,12,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Primary: runs on self-hosted Docker runner (zero quota)
  update-evidence:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run evidence pipeline
        run: python3 scripts/pipeline.py run --stage

      - name: Commit evidence changes
        id: evidence
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(pipeline): auto-update evidence pools [$DATE]"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run meeting bundler
        run: python3 scripts/bundle_meetings.py --stage

      - name: Commit bundle changes
        id: bundles
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(pipeline): auto-update meeting bundles [$DATE]"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.evidence.outputs.has_changes == 'true' || steps.bundles.outputs.has_changes == 'true'
        run: git push

  # Fallback: runs on hosted runner if self-hosted is unavailable
  update-evidence-fallback:
    needs: update-evidence
    if: ${{ always() && needs.update-evidence.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '.github/workflows/pipeline.yml'

      - name: Install dependencies
        run: |
          pip install pyyaml pdfplumber beautifulsoup4 markdownify openpyxl
          pip install yt-dlp

      - name: Run evidence pipeline
        run: python3 scripts/pipeline.py run --stage

      - name: Commit evidence changes
        id: evidence
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(pipeline): auto-update evidence pools [$DATE]"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run meeting bundler
        run: python3 scripts/bundle_meetings.py --stage

      - name: Commit bundle changes
        id: bundles
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(pipeline): auto-update meeting bundles [$DATE]"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.evidence.outputs.has_changes == 'true' || steps.bundles.outputs.has_changes == 'true'
        run: git push
