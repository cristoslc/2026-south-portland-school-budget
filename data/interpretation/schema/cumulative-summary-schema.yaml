# Cumulative Interpretation Summary View — JSON Schema (YAML encoding)
#
# Validates generated summary views that synthesize all cumulative
# interpretation records for a single persona into a current-state
# overview. Summary views are derived artifacts — they can always be
# regenerated from the immutable record store.
#
# One summary per persona, stored at:
#   data/interpretation/cumulative/<PERSONA-ID>/summary.md
#
# Spec: SPEC-020 (Cumulative Interpretation Format)
# Part of: EPIC-010 / VISION-003 (Interpretation Pipeline)
# Depends on: SPIKE-006 (Cumulative Fold Strategy)

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "cumulative-summary-schema"
title: "Cumulative Interpretation Summary View"
description: >
  Schema for a generated summary view that synthesizes all cumulative
  interpretation records for a single persona. The summary has YAML
  frontmatter with metadata, followed by five body sections:
  current_understanding, timeline, active_supersessions, open_threads,
  and resolved_threads.

type: object

required:
  - schema_version
  - persona_id
  - last_meeting_date
  - record_count
  - generated_date
  - current_understanding
  - timeline
  - active_supersessions
  - open_threads
  - resolved_threads

properties:

  # --- Frontmatter fields ---

  schema_version:
    type: string
    const: "1.0"
    description: >
      Schema version string. Allows future evolution without breaking
      existing consumers.

  persona_id:
    type: string
    pattern: "^PERSONA-\\d{3}$"
    description: >
      Persona identifier matching a validated persona document.

  persona_name:
    type: string
    description: >
      Display name of the persona. Optional but recommended.

  last_meeting_date:
    type: string
    format: date
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    description: >
      ISO 8601 date of the most recent meeting record included
      in this summary.

  record_count:
    type: integer
    minimum: 1
    description: >
      Number of cumulative interpretation records synthesized
      into this summary view.

  generated_date:
    type: string
    format: date
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    description: >
      ISO 8601 date when this summary was generated or last
      regenerated.

  # --- Body sections ---

  current_understanding:
    type: string
    minLength: 100
    description: >
      Regenerated synthesis (~150-300 words) of the persona's
      current understanding of the budget situation. Written in
      present tense. This is the authoritative current-state view.

  timeline:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/timeline_entry"
    description: >
      Ordered list of understanding shifts, one entry per meeting
      where significant change occurred. Derived from delta entries
      across all records.

  active_supersessions:
    type: array
    items:
      $ref: "#/$defs/supersession_entry"
    description: >
      Table of beliefs or understandings that have been explicitly
      replaced over time. Derived from supersession deltas across
      all records. May be empty if no supersessions have occurred.

  open_threads:
    type: array
    items:
      type: string
    description: >
      List of unresolved questions or concerns. Derived by netting
      thread_opened deltas against thread_resolved deltas across
      all records. Each entry is a brief description of the open
      question.

  resolved_threads:
    type: array
    items:
      $ref: "#/$defs/resolved_thread_entry"
    description: >
      List of questions or concerns that have been answered or
      rendered moot. Each entry includes what was resolved and when.

additionalProperties: false

$defs:

  timeline_entry:
    type: object
    required:
      - meeting_date
      - shift_summary
    properties:

      meeting_date:
        type: string
        format: date
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        description: >
          ISO 8601 date of the meeting where this shift occurred.

      shift_summary:
        type: string
        minLength: 10
        description: >
          Brief description of how the persona's understanding
          shifted at this meeting (1-2 sentences).

    additionalProperties: false

  supersession_entry:
    type: object
    required:
      - what_changed
      - from_position
      - to_position
      - when
    properties:

      what_changed:
        type: string
        description: >
          Label for the dimension that changed (e.g., "Budget
          outlook", "Tax ceiling", "Maria's posture").

      from_position:
        type: string
        description: >
          The original belief or understanding that was replaced.

      to_position:
        type: string
        description: >
          The new belief or understanding.

      when:
        type: string
        format: date
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        description: >
          ISO 8601 date when the supersession occurred.

    additionalProperties: false

  resolved_thread_entry:
    type: object
    required:
      - thread
      - resolution
      - resolved_date
    properties:

      thread:
        type: string
        description: >
          The question or concern that was resolved.

      resolution:
        type: string
        description: >
          How or what resolved the thread.

      resolved_date:
        type: string
        format: date
        pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        description: >
          ISO 8601 date when the thread was resolved.

    additionalProperties: false
